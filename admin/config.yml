backend:
  name: github
  repo: ylai60603-ops/xingyu-art-site
  branch: main
  base_url: https://xingyu-art-auth.laiyang1969.workers.dev
media_folder: "images"
public_folder: "images"

collections:
  - name: "settings"
    label: "封面与全局设置"
    files:
      - label: "首页封面设置"
        name: "cover"
        file: "data/settings.json"
        fields:
          - {label: "上传封面图片", name: "coverImage", widget: "image", choose_url: false, required: false}
  - name: "content"
    label: "管理内容"
    files:
      - label: "艺术家简介"
        name: "bio"
        file: "data/bio.json"
        fields:
          - {label: "介绍文字", name: "text", widget: "markdown"}
      - label: "作品图库"
        name: "artworks"
        file: "data/artworks.json"
        fields:
          - label: "作品列表"
            name: "items"
            widget: "list"
            summary: '{{title}}'
            fields:
              - {label: "作品标题", name: "title", widget: "string", required: false}
              - {label: "是否发布 (关闭则存为草稿，前端不显示)", name: "isPublished", widget: "boolean", default: true, required: false}
              - {label: "旧版单图 (作为首图展示)", name: "image", widget: "image", choose_url: false, required: false}
              - label: "附加作品图集 (支持多图滑动切换)"
                name: "gallery"
                widget: "list"
                required: false
                summary: '{{image}}'
                field: {label: "图片", name: "image", widget: "image", choose_url: false, required: false}
              - {label: "参数信息", name: "meta", widget: "string", required: false}
              - {label: "详细简介", name: "description", widget: "markdown", required: false}
              - {label: "首页显示宽度 (长卷选2或3)", name: "span", widget: "select", options: ["1", "2", "3"], default: "1", required: false}
              - {label: "开启长卷自动水平巡视", name: "autoScroll", widget: "boolean", default: false, required: false}