backend:
  name: github
  repo: ylai60603-ops/xingyu-art-site
  branch: main
  base_url: https://xingyu-art-auth.laiyang1969.workers.dev
media_folder: "images"
public_folder: "images"
collections:
  - name: "content"
    label: "管理内容"
    files:
      - label: "艺术家简介"
        name: "bio"
        file: "data/bio.json"
        fields:
          - {label: "介绍文字", name: "text", widget: "markdown"}
      - label: "作品图库"
        name: "artworks"
        file: "data/artworks.json"
        fields:
          - label: "作品列表"
            name: "items"
            widget: "list"
            fields:
              - {label: "作品图片", name: "image", widget: "image", choose_url: false}
              - {label: "作品标题", name: "title", widget: "string"}
              - {label: "参数信息", name: "meta", widget: "string"}
              - {label: "详细简介", name: "description", widget: "markdown"}
              # 【物理核心指令】：新增跨度下拉菜单，默认值为 1
              - {label: "首页显示宽度 (长卷选2或3)", name: "span", widget: "select", options: ["1", "2", "3"], default: "1"}